<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6a14a"/>
      <stop offset="1" stop-color="#e2682b"/>
    </linearGradient>
    <linearGradient id="bagShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fdeede"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Einkaufstasche -->
  <g transform="translate(256 268)">
    <!-- Henkel -->
    <path d="M-60 -54 a60 60 0 0 1 120 0" fill="none" stroke="#ffffff"
          stroke-width="26" stroke-linecap="round" opacity="0.92"/>
    <!-- Beutel -->
    <path d="M-104 -54 H104 L92 120 a26 26 0 0 1 -26 24 H-66 a26 26 0 0 1 -26 -24 Z"
          fill="url(#bagShade)"/>
    <!-- Bestell-Linien -->
    <g stroke="#e2682b" stroke-width="15" stroke-linecap="round" opacity="0.85">
      <line x1="-58" y1="2" x2="58" y2="2"/>
      <line x1="-58" y1="46" x2="30" y2="46"/>
    </g>
    <!-- Euro-Akzent -->
    <circle cx="62" cy="50" r="6" fill="#e2682b"/>
  </g>
</svg>
